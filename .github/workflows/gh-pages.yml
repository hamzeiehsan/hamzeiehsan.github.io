name: github pages

on:
  push:
    branches:
      - main
  pull_request:

# This permission block is crucial for peaceiris/actions-gh-pages to push code
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Highly stable Node 20/24 compatible version
        with:
          submodules: true
          fetch-depth: 0

      - name: Hugo setup
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3 # Reverted to v3 to fix the exit code 1 bug
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public